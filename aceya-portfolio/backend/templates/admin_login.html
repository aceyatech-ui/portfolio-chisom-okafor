<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login</title>
<meta name="robots" content="noindex, nofollow">
<style>
  body{ margin:0; font-family: 'JetBrains Mono', monospace; background:#0A0A0A; color:#F5F5F5;
        display:flex; align-items:center; justify-content:center; min-height:100vh; }
  .card{ background:#151515; border:1px solid rgba(245,245,245,0.12); border-radius:14px;
         padding:2rem; width:100%; max-width:340px; }
  h1{ font-size:1.1rem; margin:0 0 1.2rem; }
  input{ width:100%; box-sizing:border-box; padding:0.7rem 0.9rem; border-radius:8px;
         border:1px solid rgba(245,245,245,0.2); background:#0A0A0A; color:#F5F5F5; margin-bottom:1rem; }
  button{ width:100%; padding:0.75rem; border-radius:8px; border:none; background:#888888;
          color:#1A1A1A; font-family:inherit; font-weight:600; cursor:pointer; }
  .error{ color:#ff8080; font-size:0.85rem; margin-bottom:1rem; }
</style>
</head>
<body>
  <div class="card">
    <h1>// admin access</h1>
    {% if error %}<p class="error">{{ error }}</p>{% endif %}
    <form method="POST">
      <input type="text" name="username" placeholder="Username" autofocus required>
      <input type="password" name="password" placeholder="Password" required>
      <button type="submit">Log in</button>
    </form>
  </div>
</body>
</html>
